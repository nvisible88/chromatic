<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Generate og.png — Chromatic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    html,body{height:100%;margin:0;background:#070708;color:#f4f0e8;font-family:JetBrains Mono,monospace;display:flex;align-items:center;justify-content:center}
    .wrap{max-width:1280px;width:100%;padding:24px;box-sizing:border-box;text-align:center}
    canvas{background:#0a0a0b;border-radius:8px;display:block;margin:0 auto;box-shadow:0 10px 40px rgba(0,0,0,0.6)}
    .controls{margin-top:18px}
    button{background:#e8c547;border:none;padding:12px 18px;border-radius:6px;color:#0a0a0b;font-weight:700;cursor:pointer}
    .hint{color:#a8a39a;margin-top:10px;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="canvas" width="1200" height="630" aria-hidden="true"></canvas>
    <div class="controls">
      <button id="download">Download og.png</button>
      <div class="hint">Click to generate a 1200×630 social preview image (og.png)</div>
    </div>
  </div>

  <script>
    const bg = '#0a0a0b';
    const ink = '#f4f0e8';
    const inkDim = '#a8a39a';
    const accent = '#e8c547';
    const line = '#26252a';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function roundRect(x,y,w,h,r){
      const path = new Path2D();
      path.moveTo(x+r,y);
      path.arcTo(x+w,y,x+w,y+h,r);
      path.arcTo(x+w,y+h,x,y+h,r);
      path.arcTo(x,y+h,x,y,r);
      path.arcTo(x,y,x+w,y,r);
      return path;
    }

    function draw() {
      // background
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,canvas.width,canvas.height);

      // radial gold hint top-right
      const rg = ctx.createRadialGradient(1050,80,10,1200,0,700);
      rg.addColorStop(0, 'rgba(232,197,71,0.06)');
      rg.addColorStop(1, 'rgba(232,197,71,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(0,0,canvas.width,canvas.height);

      // thin horizontal rule
      ctx.fillStyle = accent;
      ctx.fillRect(80,130,240,1);

      // wordmark
      ctx.fillStyle = accent;
      ctx.font = "italic 300 140px Fraunces, serif";
      ctx.textBaseline = 'middle';
      // letter-spacing approximation: draw whole string (close enough)
      ctx.fillText('CHROMATIC', 80, 280);

      // subtitle
      ctx.fillStyle = ink;
      ctx.font = "400 36px Fraunces, serif";
      ctx.textBaseline = 'top';
      ctx.fillText('The Color Perception Test', 80, 360);

      // body tagline
      ctx.fillStyle = inkDim;
      ctx.font = "400 20px 'JetBrains Mono', monospace";
      const body = 'Designers see what others miss. Most people fail.';
      wrapText(body, 80, 430, 520, 26);

      // bottom-left small line
      ctx.fillStyle = inkDim;
      ctx.font = "700 13px 'JetBrains Mono', monospace";
      const bottom = 'Farnsworth-Munsell inspired · 30 levels'.toUpperCase();
      drawSpacedText(bottom, 80, 560, 0.24);

      // right column swatches
      const swX = 1000;
      const swY = 285; // centered around 315; adjust
      const size = 70;
      const gap = 8;
      const colors = [
        'hsl(15, 65%, 55%)',
        'hsl(140, 60%, 50%)',
        'hsl(220, 55%, 55%)',
        'hsl(220, 55%, 53%)',
        'hsl(220, 53%, 53%)'
      ];
      // compute top of column so it's vertically centered
      const totalH = colors.length*size + (colors.length-1)*gap;
      let top = (canvas.height - totalH)/2;
      for (let i=0;i<colors.length;i++){
        const y = top + i*(size+gap);
        ctx.fillStyle = colors[i];
        const p = roundRect(swX, y, size, size, 4);
        ctx.fill(p);
      }

      // label under column
      ctx.fillStyle = inkDim;
      ctx.font = "400 11px 'JetBrains Mono', monospace";
      drawSpacedText('\u2192 FIND THE ONE', swX, top + totalH + 12, 0.2);
    }

    function wrapText(text,x,y,maxWidth,lineHeight){
      const words = text.split(' ');
      let line = '';
      for (let n=0;n<words.length;n++){
        const testLine = line + words[n] + ' ';
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && n>0){
          ctx.fillText(line, x, y);
          line = words[n] + ' ';
          y += lineHeight;
        } else {
          line = testLine;
        }
      }
      ctx.fillText(line, x, y);
    }

    function drawSpacedText(text,x,y,spacing){
      // spacing is em-like; approximate with measure of ' ' and multiply
      let offset = x;
      for (const ch of text){
        ctx.fillText(ch, offset, y);
        const w = ctx.measureText(ch).width;
        offset += w + spacing*6; // heuristic
      }
    }

    document.getElementById('download').addEventListener('click', async () => {
      // redraw to ensure latest fonts
      await document.fonts.ready;
      draw();
      canvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'og.png';
        document.body.appendChild(a);
        a.click();
        setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
      }, 'image/png');
    });

    // initial draw when fonts ready
    document.fonts.ready.then(draw).catch(draw);
  </script>
</body>
</html>
